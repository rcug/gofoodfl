<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GofoodFL Wheel Arcade</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; 
               background: #f0f4f1; color: #2d3748; text-align: center; padding: 6px; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        #map { width: 98%; height: 280px; border-radius: 12px; margin-top: 20px; background: #e5e5e5; border: 1px solid #ddd; }
        #locate-btn, #spin-btn { width: 72%; padding: 5px; font-size: 16px; 
               font-weight: 600; border: none; border-radius: 5px; cursor: pointer; transition: all 0.15s ease; }
        #locate-btn { background: #00c853; color: #e1e5dc; box-shadow: 0 5px 0 #009624; }
        #spin-btn { background: #f1c40f; color: #2c3e50; box-shadow: 0 5px 0 #d4af37; }
        #locate-btn:active, #spin-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #009624; }
        #spin-btn:active { box-shadow: 0 2px 0 #ba2d00; }
        .wheel-wrapper { position: relative; margin: 15px 0; width: 325px; height: 325px; }
        #wheel { width: 100%; height: 100%; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                   border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid #222; z-index: 10; }
        #result-box { font-size:clamp(10px, 4.2vw, 15px); font-weight: bold; margin: 6px 0; min-height: 44px; display: flex; 
            align-items: center; justify-content: center; padding: 0 10px; width: 100%; box-sizing: border-box; }
    
        #result-box { font-size:clamp(10px, 4.2vw, 15px); font-weight: bold; margin: 14px 0; min-height: 44px; display: flex; 
            align-items: center; justify-content: center; padding: 0 10px; width: 100%; box-sizing: border-box; }
        .purple-pin { filter: hue-rotate(130deg) saturate(1.5); }
        @keyframes winnerBlink {
            0% { border-color: transparent; box-shadow: 0 0 0px transparent; }
            25% { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; } 
            50% { border-color: transparent; box-shadow: 0 0 0px transparent; }
            75% { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
            100% { border-color: #ff00ff; box-shadow: 0 0 5px #ff00ff; } }
        .winning-card { border: 2px solid transparent; border-radius: 8px; padding: 6px 12px; 
            background: #fff; display: inline-flex; flex-direction: row; align-items: center; 
            justify-content: center; width: 75%; box-sizing: border-box; gap: 8px;
            font-size: clamp(8px, 3.8vw, 15px); animation: winnerBlink 1.5s ease-in-out forwards; }
        .winning-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            max-width: 78%; font-weight: bold; } 
        #result-box { font-size:clamp(12px, 4.2vw, 15px); font-weight: bold; margin: 14px 0; min-height: 44px; display: flex; 
            align-items: center; justify-content: center; padding: 0 10px; width: 100%; box-sizing: border-box; }
        .share-result-btn { background-color: rgba(44, 62, 80, 0.1); color: white; border: none; width: 25px; height: 25px; font-size: 13px; 
            flex-shrink: 0; border-radius: 45%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background 0.1s; }
        .share-result-btn:hover { background-color: rgba(44, 62, 80, 0.2); }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-bottom:4px; letter-spacing:0.8px;">🍕 GOFOOD ARCADE 🎡</h2>
        <button id="locate-btn">📍Locate Me!</button>
        <div id="result-box">Tap above to unlock nearby spots!</div>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheel" width="325" height="325"></canvas>
        </div>
        <button id="spin-btn">🎯 Spin the Wheel</button>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([28.14, -82.35], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markerLayer = L.layerGroup().addTo(map);
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const resBox = document.getElementById("result-box");
        const locateBtn = document.getElementById("locate-btn");
        const spinBtn = document.getElementById("spin-btn");
        
        let restaurants = [], currentRotation = 0;
        const totalSegments = 24, arc = (2 * Math.PI) / totalSegments;
        const emojis = ["🍔", "🍕", "🌮", "🍣", "🍟", "🍩"];
        const wheelColors = ["#ff7675", "#55efc4", "#ffeaa7", "#74b9ff"];

        const getDistance = (lat1, lon1, lat2, lon2) => {
            const p = Math.PI / 180;
            const a = 0.5 - Math.cos((lat2 - lat1) * p)/2 + 
                      Math.cos(lat1 * p) * Math.cos(lat2 * p) * (1 - Math.cos((lon2 - lon1) * p)) / 2;
            return 2 * 3958.8 * Math.asin(Math.sqrt(a));
        };

        function drawWheel(labels = []) {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate(currentRotation);

            for (let i = 0; i < totalSegments; i++) {
                ctx.beginPath();
                ctx.fillStyle = wheelColors[i % wheelColors.length];
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.4)";
                ctx.stroke();
                ctx.save();
                ctx.fillStyle = "#2c3e50";
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right";
                ctx.font = "bold 10px sans-serif";
                
                let text = labels[i]?.name || `${emojis[i % emojis.length]} Eats ${i + 1}`;
                if (text.length > 15) text = text.substring(0, 13) + "...";
                
                ctx.fillText(text, radius - 15, 4);
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(0, 0, radius - 2, 0, 2 * Math.PI);
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#2c3e50";
            ctx.stroke();
            ctx.restore();
        }
        drawWheel();

        const toggleUiState = (msg, btnText) => {
            resBox.innerText = msg;
            locateBtn.innerText = btnText; locateBtn.style.background = "#7f8c8d";
            spinBtn.style.visibility = "visible"; spinBtn.style.opacity = "1"; };

        locateBtn.addEventListener("click", () => {
            resBox.innerText = "Locating your device...";
            locateBtn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: uLat, longitude: uLon } = pos.coords;
                map.setView([uLat, uLon], 14);
                markerLayer.clearLayers();
                L.marker([uLat, uLon]).addTo(markerLayer).bindPopup("You are here!").openPopup();

                try {
                    const res = await fetch('data/gofoodfl.json');
                    const data = await res.json();
                    data.forEach(p => p.distance = getDistance(uLat, uLon, p.latitude, p.longitude));
                    restaurants = data.sort((a, b) => a.distance - b.distance).slice(0, totalSegments);
                    toggleUiState("🎉 24 Choices Loaded! Ready?", "🔒 Location Locked");
                } catch (e) {
                    resBox.innerText = "JSON Error. Using temporary arcade options!";
                    restaurants = Array.from({length: totalSegments}, (_, i) => ({
                        name: `${emojis[i % emojis.length]} Arcade Spot ${i+1}`,
                        latitude: uLat + (Math.random() - 0.5) * 0.02,
                        longitude: uLon + (Math.random() - 0.5) * 0.02,
                        distance: Math.random() * 2
                    }));
                    toggleUiState("JSON Error. Using temporary options!", "🔒 Location Locked");
                }
                drawWheel(restaurants);
            }, () => {
                resBox.innerText = "Location access denied.";
                locateBtn.disabled = false;
                locateBtn.innerText = "Retry Location Check";
            });
        });

        spinBtn.addEventListener("click", () => {
            if (!restaurants.length) return;
            resBox.innerText = "🎡 Selecting a spot...";
            spinBtn.style.opacity = "0";
            spinBtn.style.visibility = "hidden";
            
            const duration = 3000, start = performance.now();
            const extraSpins = (Math.random() * 5 + 5) * 2 * Math.PI; 
            const initRot = currentRotation;

            function animate(timestamp) {
                const progress = Math.min((timestamp - start) / duration, 1);
                currentRotation = initRot + ((1 - Math.pow(1 - progress, 3)) * extraSpins);
                drawWheel(restaurants);

                if (progress < 1) return requestAnimationFrame(animate);

                const normRot = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
                const winningIdx = Math.floor(((normRot + (3 * Math.PI / 2)) % (2 * Math.PI)) / arc) % totalSegments;
                const winner = restaurants[winningIdx];
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${winner.latitude},${winner.longitude}`;
                resBox.innerHTML = `<div class="winning-card"><span class="winning-text">🎉 Found: ` +
                    `<span style="color:#ff3d00;">${winner.name}</span>` +
                    `</span><button id="shareWinnerBtn" class="share-result-btn">🔗</button></div>`;
                document.getElementById('shareWinnerBtn').addEventListener('click', async () => {
                    const txt = `Let's eat at ${winner.name}! Map:`;
                    if (navigator.share) {
                        try { await navigator.share({ title: `Food: ${winner.name}`, text: txt, url: mapsUrl }); }
                        catch (err) { console.log('Share dismissed'); }
                    } else {
                        navigator.clipboard.writeText(`${txt} ${mapsUrl}`);
                        alert('Link copied to clipboard!'); }
                });
                
                spinBtn.style.visibility = "visible";
                spinBtn.style.opacity = "1";

                L.marker([winner.latitude, winner.longitude], {
                    icon: L.icon({
                        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34],
                        className: 'purple-pin'
                    })
                }).addTo(markerLayer).bindPopup(`<b>🔥 Go Here: ${winner.name}</b>`).openPopup();
                map.panTo([winner.latitude, winner.longitude]);
            }
            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
